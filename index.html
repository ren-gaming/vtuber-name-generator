<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VTuber Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>✨ VTuber Name Generator</h1>

    <div class="panel">
      <label>Choose Style:</label>
      <select id="styleSelect">
        <option value="cute">Cute</option>
        <option value="dark">Dark / Edgy</option>
        <option value="cyber">Cyberpunk</option>
        <option value="fantasy">Fantasy</option>
      </select>
<label>Animal Hybrid:</label>
<select id="animalSelect">
  <option value="random">Random</option>
  <option value="cat">Cat</option>
  <option value="fox">Fox</option>
  <option value="wolf">Wolf</option>
  <option value="bunny">Bunny</option>
  <option value="dragon">Dragon</option>
  <option value="none">None</option>
</select>
      <button onclick="generateVTuber()">Generate</button>
      <button onclick="downloadCard()">Download ID Card</button>
    </div>

    <div class="card" id="card">
      <h2 id="name">🌟 Your VTuber Name</h2>
      <p id="theme">Theme:</p>
      <p id="style">Style:</p>
      <p id="personality">Personality:</p>
    </div>
  </div>

  <!-- html2canvas library -->
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

  <script src="script.js"></script>
</body>
</html>
